app:
  # Declare APP_ID under environment.variables and set it in the shell/CI
  # environment before running Forge deploy/install so the manifest resolves to
  # your registered app ARI.
  id: ari:cloud:ecosystem::app/${APP_ID}
  runtime:
    name: nodejs22.x

environment:
  variables:
    - APP_ID

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - storage:app
  content:
    styles:
      - unsafe-inline

modules:
  jira:projectPage:
    - key: jira-sla-project-page
      title: SLA Analytics
      layout: basic
      resource: main
      resolver:
        function: ui-resolver
  jira:issuePanel:
    - key: jira-sla-issue-panel
      title: SLA Breakdown
      resource: main
      resolver:
        function: ui-resolver
  jira:dashboardGadget:
    - key: jira-sla-dashboard-gadget
      title: SLA Metrics
      description: Visualize SLA metrics, breaches, and assignee performance
      resource: main
      resolver:
        function: ui-resolver
  scheduledTrigger:
    - key: jira-sla-scheduled-sync
      function: scheduled-sync
      interval: fiveMinute
  action:
    - key: jira-sla-automation-recompute
      title: Recompute SLA data
      description: Recompute the persisted SLA summary for an issue or project window
      function: automation-recompute
    - key: jira-sla-rovo-get-summary
      title: Get issue SLA summary
      description: Returns the precomputed SLA summary for a given issue key
      function: rovo-get-summary
    - key: jira-sla-rovo-explain-issue
      title: Explain issue SLA timeline
      description: Returns a human-readable explanation of the SLA timeline for an issue
      function: rovo-explain-issue
    - key: jira-sla-rovo-list-breaches
      title: List breached SLA issues
      description: Returns the list of issues that have breached SLA for the provided filters
      function: rovo-list-breaches
    - key: jira-sla-rovo-get-assignee-metrics
      title: Get assignee SLA metrics
      description: Returns assignee-level response, handling, and breach metrics
      function: rovo-get-assignee-metrics
  rovo:agent:
    - key: jira-sla-agent
      name: SLA Analyst
      description: >
        I help analyse Jira SLA data, including response times, active handling
        time, SLA breaches, assignee performance, and ticket timeline
        explanations.
      prompt: resource:agent-prompt
      actions:
        - jira-sla-rovo-get-summary
        - jira-sla-rovo-explain-issue
        - jira-sla-rovo-list-breaches
        - jira-sla-rovo-get-assignee-metrics
  function:
    - key: ui-resolver
      handler: src/functions/index.uiResolver
    - key: scheduled-sync
      handler: src/functions/index.scheduledSync
    - key: automation-recompute
      handler: src/functions/index.automationRecompute
    - key: rovo-get-summary
      handler: src/functions/index.rovoGetIssueSummary
    - key: rovo-explain-issue
      handler: src/functions/index.rovoExplainIssue
    - key: rovo-list-breaches
      handler: src/functions/index.rovoListBreaches
    - key: rovo-get-assignee-metrics
      handler: src/functions/index.rovoGetAssigneeMetrics

resources:
  - key: main
    path: resources/app
  - key: agent-prompt
    path: src/rovo/agent-prompt.txt
