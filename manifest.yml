app:
  id: ari:cloud:ecosystem::app/1916283a-c119-4efd-825f-6d285466ea5a
  runtime:
    name: nodejs22.x

environment:
  variables:
    - APP_ID
    - USE_SEED_DATA
    - TEAM_FIELD_KEY

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - storage:app
  content:
    styles:
      - unsafe-inline

modules:
  jira:projectPage:
    - key: jira-sla-project-page
      title: SLA Analytics
      layout: basic
      resource: main
      resolver:
        function: ui-resolver
  jira:issuePanel:
    - key: jira-sla-issue-panel
      title: SLA Breakdown
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: ui-resolver
  jira:dashboardGadget:
    - key: jira-sla-dashboard-gadget
      title: SLA Metrics
      description: Visualize SLA metrics, breaches, and assignee performance
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      resource: main
      resolver:
        function: ui-resolver
  scheduledTrigger:
    - key: jira-sla-scheduled-sync
      function: scheduled-sync
      interval: fiveMinute
  action:
    - key: jira-sla-automation-recompute
      name: Recompute SLA data
      description: Recompute the persisted SLA summary for an issue or project window
      function: automation-recompute
      actionVerb: TRIGGER
      inputs:
        issueKey:
          title: Issue key
          type: string
          required: false
          description: Jira issue key to recompute, such as PROJ-123.
    - key: jira-sla-rovo-get-summary
      name: Get issue SLA summary
      description: Returns the precomputed SLA summary for a given issue key
      function: rovo-get-summary
      actionVerb: GET
      inputs:
        issueKey:
          title: Issue key
          type: string
          required: true
          description: Jira issue key to retrieve an SLA summary for.
    - key: jira-sla-rovo-explain-issue
      name: Explain issue SLA timeline
      description: Returns a human-readable explanation of the SLA timeline for an issue
      function: rovo-explain-issue
      actionVerb: GET
      inputs:
        issueKey:
          title: Issue key
          type: string
          required: true
          description: Jira issue key to explain.
    - key: jira-sla-rovo-list-breaches
      name: List breached SLA issues
      description: Returns the list of issues that have breached SLA for the provided
        filters
      function: rovo-list-breaches
      actionVerb: GET
      inputs:
        projectKey:
          title: Project key
          type: string
          required: true
          description: Jira project key to search for breached issues.
        priority:
          title: Priority
          type: string
          required: false
          description: Optional priority name to filter by.
        assigneeAccountId:
          title: Assignee account ID
          type: string
          required: false
          description: Optional Atlassian account ID to filter by current assignee.
    - key: jira-sla-rovo-get-assignee-metrics
      name: Get assignee SLA metrics
      description: Returns assignee-level response, handling, and breach metrics
      function: rovo-assignee-metrics
      actionVerb: GET
      inputs:
        projectKey:
          title: Project key
          type: string
          required: true
          description: Jira project key to summarize by assignee.
  automation:actionProvider:
    - key: jira-sla-automation-provider
      actions:
        - jira-sla-automation-recompute
  rovo:agent:
    - key: jira-sla-agent
      name: SLA Analyst
      description: >
        I help analyse Jira SLA data, including response times, active handling
        time, SLA breaches, assignee performance, and ticket timeline
        explanations.
      prompt: resource:agent-resource;agent-prompt.txt
      actions:
        - jira-sla-rovo-get-summary
        - jira-sla-rovo-explain-issue
        - jira-sla-rovo-list-breaches
        - jira-sla-rovo-get-assignee-metrics
  function:
    - key: ui-resolver
      handler: index.uiResolver
    - key: scheduled-sync
      handler: index.scheduledSync
    - key: automation-recompute
      handler: index.automationRecompute
    - key: rovo-get-summary
      handler: index.rovoGetIssueSummary
    - key: rovo-explain-issue
      handler: index.rovoExplainIssue
    - key: rovo-list-breaches
      handler: index.rovoListBreaches
    - key: rovo-assignee-metrics
      handler: index.rovoGetAssigneeMetrics

resources:
  - key: main
    path: resources/app
  - key: agent-resource
    path: src/rovo
